services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bcard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bcard}
      POSTGRES_DB: ${POSTGRES_DB:-bcard}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bcard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://bcard:bcard@db:5432/bcard}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3017:3000"
    volumes:
      - ./data/uploads:/app/public/uploads
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://bcard:bcard@db:5432/bcard}
    depends_on:
      migrate:
        condition: service_completed_successfully
